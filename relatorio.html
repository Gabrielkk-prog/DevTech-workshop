    <!-- Botão de teste -->
    <button onclick="testarConexao()" style="margin: 10px; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
        🔍 Testar Conexão Supabase
    </button>
    
    <table>

                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Telefone</th>
                        <th>Área de Atuação</th>
                        <th>Interesse</th>
                        <th>Data de inscrição</th>
                    </tr>
                </thead>

                <tbody id="tabelaInscritos"></tbody>

            </table>

<script>
const supabaseClient = supabase.createClient(
  "https://qgnaenyrbxgjaesejhoc.supabase.co",
  "sb_publishable_4xw9YjqGOxeyB5LxZBmGDw_wrYelGGb"
);
</script>

<script>
    // ========================================
    // RELATÓRIO
    // ========================================

    if (document.getElementById("tabelaInscritos")) {
        console.log("✅ Elemento tabelaInscritos encontrado, carregando dados...");
        carregarInscritos();
    } else {
        console.error("❌ Elemento tabelaInscritos NÃO encontrado!");
    }


// ========================================
// FUNÇÃO DE TESTE
// ========================================

async function testarConexao() {
    console.log("🧪 Iniciando teste de conexão...");
    
    try {
        // Teste básico de conexão
        const { data, error } = await supabaseClient
            .from("Cadastro")
            .select("count", { count: 'exact', head: true });
            
        if (error) {
            console.error("❌ Erro no teste:", error);
            alert("❌ Teste falhou:\n" + error.message);
        } else {
            console.log("✅ Conexão OK! Count:", data);
            alert("✅ Conexão com Supabase funcionando!\n\nSe não há dados, verifique:\n• Se há cadastros salvos\n• Permissões RLS no Supabase\n• Nome correto da tabela");
        }
    } catch (err) {
        console.error("❌ Erro no teste:", err);
        alert("❌ Erro no teste: " + (err.message || JSON.stringify(err)));
    }
}


// ========================================
// CARREGAR INSCRITOS
// ========================================

async function carregarInscritos() {
    console.log("🔄 Buscando inscritos...");

    try {
        // Primeiro, vamos testar a conexão e ver se a tabela existe
        console.log("🔍 Testando conexão com Supabase...");
        
        // Tentar com "Cadastro" (maiúsculo)
        let { data: testData, error: testError } = await supabaseClient
            .from("Cadastro")
            .select("count", { count: 'exact', head: true });

        console.log("📊 Teste com 'Cadastro' - Count:", testData, "Erro:", testError);

        // Se não funcionar, tentar com "cadastro" (minúsculo)
        if (testError) {
            console.log("🔄 Tentando com 'cadastro' minúsculo...");
            const result = await supabaseClient
                .from("cadastro")
                .select("count", { count: 'exact', head: true });
            testData = result.data;
            testError = result.error;
            console.log("📊 Teste com 'cadastro' - Count:", testData, "Erro:", testError);
        }

        if (testError) {
            console.error("❌ Problema com ambas as tabelas:", testError);
            alert("❌ Erro na tabela:\n" + testError.message + "\n\nVerifique se a tabela existe e tem as permissões corretas.");
            return;
        }

        // Agora buscar os dados
        let { data, error } = await supabaseClient
            .from("Cadastro")
            .select("*");

        console.log("📊 Dados recebidos de 'Cadastro':", data);
        console.log("⚠️ Erro (se houver):", error);

        // Se não funcionar, tentar com "cadastro" minúsculo
        if (error && error.message.includes("relation") || error.message.includes("table")) {
            console.log("🔄 Tentando com 'cadastro' minúsculo...");
            const result = await supabaseClient
                .from("cadastro")
                .select("*");
            data = result.data;
            error = result.error;
            console.log("📊 Dados recebidos de 'cadastro':", data);
            console.log("⚠️ Erro (se houver):", error);
        }

        if (error) {
            console.error("❌ Erro ao buscar:", error);
            alert("❌ Erro ao carregar relatório:\n" + error.message);
            return;
        }

        if (!data) {
            console.warn("⚠️ Data é null/undefined");
            alert("⚠️ Dados não encontrados");
            return;
        }

        if (data.length === 0) {
            console.warn("⚠️ Nenhum cadastro encontrado");
            alert("⚠️ Nenhum cadastro encontrado no banco de dados\n\nPossíveis causas:\n• Ainda não há cadastros\n• Problemas de permissões (RLS)\n• Dados salvos em tabela diferente\n• Verifique o painel do Supabase");
            return;
        }

        const tabela = document.getElementById("tabelaInscritos");
        if (!tabela) {
            console.error("❌ Elemento tabelaInscritos não encontrado!");
            return;
        }

        tabela.innerHTML = "";
        console.log(`✅ Carregando ${data.length} inscritos...`);

        data.forEach((inscrito, index) => {
            console.log(`👤 Inscrito ${index + 1}:`, inscrito);
            tabela.innerHTML += `
                <tr>
                    <td>${inscrito.nome ?? ""}</td>
                    <td>${inscrito.email ?? ""}</td>
                    <td>${inscrito.telefone ?? ""}</td>
                    <td>${inscrito.atuacao ?? ""}</td>
                    <td>${inscrito.interesse ?? ""}</td>
                    <td>${inscrito.data ?? ""}</td>
                </tr>
            `;
        });

        console.log("✅ Tabela populada com sucesso!");

    } catch (err) {
        console.error("❌ Erro geral:", err);
        alert("❌ Erro inesperado: " + (err.message || JSON.stringify(err)));
    }
}

}
</script>
