    <p>relatorio do sistema</p>
    
    <!-- Botão de teste -->
    <button onclick="testarConexao()" style="margin: 10px; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
        🔍 Testar Conexão Supabase
    </button>
    
    <table>

                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Telefone</th>
                        <th>Área de Atuação</th>
                        <th>Interesse</th>
                        <th>Data de inscrição</th>
                    </tr>
                </thead>

                <tbody id="tabelaInscritos"></tbody>

            </table>

            <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://qgnaenyrbxgjaesejhoc.supabase.co",
  "sb_publishable_4xw9YjqGOxeyB5LxZBmGDw_wrYelGGb"
);
</script>

<script>
    // ========================================
    // RELATÓRIO
    // ========================================

    if (document.getElementById("tabelaInscritos")) {
        carregarInscritos();
    }


// ========================================
// CARREGAR INSCRITOS
// ========================================

async function carregarInscritos() {
    try {
        console.log("🔄 Buscando inscritos...");

        const { data, error } = await supabaseClient
            .from("Cadastro")
            .select("*");

        console.log("📊 Dados:", data);
        console.log("⚠️ Erro:", error);

        if (error) {
            console.error("❌ Erro:", error);
            alert("Erro: " + error.message);
            return;
        }

        if (!data || data.length === 0) {
            console.warn("⚠️ Nenhum dado encontrado");
            alert("Nenhum cadastro encontrado");
            return;
        }

        const tabela = document.getElementById("tabelaInscritos");
        if (!tabela) return;

        tabela.innerHTML = "";

        data.forEach(inscrito => {
            tabela.innerHTML += `
                <tr>
                    <td>${inscrito.nome ?? ""}</td>
                    <td>${inscrito.email ?? ""}</td>
                    <td>${inscrito.telefone ?? ""}</td>
                    <td>${inscrito.atuacao ?? ""}</td>
                    <td>${inscrito.interesse ?? ""}</td>
                    <td>${inscrito.data ?? ""}</td>
                </tr>
            `;
        });

        console.log("✅ Relatório carregado!");

    } catch (err) {
        console.error("❌ Erro geral:", err);
        alert("Erro inesperado: " + (err.message || "Erro desconhecido"));
    }
}


// ========================================
// FUNÇÃO DE TESTE
// ========================================

async function testarConexao() {
    console.log("🧪 Testando conexão...");
    
    try {
        const { data, error } = await supabaseClient
            .from("Cadastro")
            .select("count", { count: 'exact', head: true });
            
        if (error) {
            console.error("❌ Erro:", error);
            alert("❌ Teste falhou:\n" + error.message);
        } else {
            console.log("✅ Conexão OK!");
            alert("✅ Conexão funcionando!");
        }
    } catch (err) {
        console.error("❌ Erro:", err);
        alert("❌ Erro no teste: " + (err.message || JSON.stringify(err)));
    }
}
</script>
