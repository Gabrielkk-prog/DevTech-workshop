<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Supabase</title>
</head>
<body>
    <h1>🧪 Teste de Conexão Supabase</h1>

    <button onclick="testarTudo()">🔍 Testar Tudo</button>

    <div id="resultados" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script>
        const supabaseClient = supabase.createClient(
            "https://qgnaenyrbxgjaesejhoc.supabase.co",
            "sb_publishable_4xw9YjqGOxeyB5LxZBmGDw_wrYelGGb"
        );

        function log(msg) {
            console.log(msg);
            document.getElementById('resultados').innerHTML += '<p>' + msg + '</p>';
        }

        async function testarTudo() {
            document.getElementById('resultados').innerHTML = '<h3>Testando...</h3>';

            try {
                // Teste 1: Conexão básica
                log('🔄 Testando conexão básica...');
                const { data: authData, error: authError } = await supabaseClient.auth.getSession();
                log('✅ Conexão básica: ' + (authError ? 'Erro: ' + authError.message : 'OK'));

                // Teste 2: Tabela "Cadastro"
                log('🔄 Testando tabela "Cadastro"...');
                const { data: cadastroData, error: cadastroError } = await supabaseClient
                    .from("Cadastro")
                    .select("*")
                    .limit(5);

                if (cadastroError) {
                    log('❌ Erro em "Cadastro": ' + cadastroError.message);
                } else {
                    log('✅ Tabela "Cadastro" OK - ' + (cadastroData ? cadastroData.length : 0) + ' registros');
                    if (cadastroData && cadastroData.length > 0) {
                        log('📊 Primeiro registro: ' + JSON.stringify(cadastroData[0]));
                    }
                }

                // Teste 3: Tabela "cadastro" (minúsculo)
                log('🔄 Testando tabela "cadastro"...');
                const { data: cadastroMinusculoData, error: cadastroMinusculoError } = await supabaseClient
                    .from("cadastro")
                    .select("*")
                    .limit(5);

                if (cadastroMinusculoError) {
                    log('❌ Erro em "cadastro": ' + cadastroMinusculoError.message);
                } else {
                    log('✅ Tabela "cadastro" OK - ' + (cadastroMinusculoData ? cadastroMinusculoData.length : 0) + ' registros');
                    if (cadastroMinusculoData && cadastroMinusculoData.length > 0) {
                        log('📊 Primeiro registro: ' + JSON.stringify(cadastroMinusculoData[0]));
                    }
                }

                // Teste 4: Inserir teste
                log('🔄 Testando inserção...');
                const testeRegistro = {
                    nome: 'Teste ' + new Date().toLocaleTimeString(),
                    email: 'teste@teste.com',
                    telefone: '11999999999',
                    atuacao: 'Teste',
                    interesse: 'Teste',
                    fonte: 'Teste',
                    data: new Date().toISOString()
                };

                const { data: insertData, error: insertError } = await supabaseClient
                    .from("Cadastro")
                    .insert([testeRegistro]);

                if (insertError) {
                    log('❌ Erro na inserção: ' + insertError.message);
                } else {
                    log('✅ Inserção OK');
                }

            } catch (err) {
                log('❌ Erro geral: ' + (err.message || JSON.stringify(err)));
            }

            log('🏁 Teste concluído!');
        }
    </script>
</body>
</html></content>
