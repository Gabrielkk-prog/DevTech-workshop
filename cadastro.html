<!DOCTYPE html> 
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Cadastro - Devtech</title>
    <link rel="icon" type="image/png" href="asset/img/logo.png">
    <link rel="stylesheet" href="asset/css/style.css">
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://qgnaenyrbxgjaesejhoc.supabase.co",
  "sb_publishable_4xw9YjqGOxeyB5LxZBmGDw_wrYelGGb"
);
</script>

<body>

       <nav>
        <a href="index.html">Início</a> |
        <a href="cadastro.html">Cadastro</a> |
        <a href="sobre.html">Eventos</a>
    </nav>


<form id="cadastro-form" >

    <!-- Campos precisam de "name" -->
    <label>Nome:</label>
    <input type="text" id="nome" name="nome" required>

    <label>Email:</label>
    <input type="email" id="email" name="email" required>

    <label>Telefone:</label>
    <input type="tel" id="telefone" name="telefone">

    <label>Data de Nascimento:</label>
    <input type="date" id="nascimento" name="nascimento">

    <h3>Área de atuação:</h3>
    <select id="atuacao" name="atuacao">
        <option value="">Selecionar...</option>
        <option>Estudante</option>
        <option>Desenvolvedor</option>
        <option>Profissional de TI</option>
        <option>Empreendedor</option>
        <option>Outro</option>
    </select>

    <h3>Como ficou sabendo?</h3>
    <!-- Radios precisam ter o mesmo name -->
    <label><input type="radio" name="fonte" value="Instagram"> Instagram</label>
    <label><input type="radio" name="fonte" value="Faculdade"> Faculdade</label>
    <label><input type="radio" name="fonte" value="Amigos"> Amigos</label>

    <h3>Interesses:</h3>
    <!-- Para múltiplos valores use name="atividade[]" -->
    <label><input type="checkbox" name="interesse[]" value="IA"> Palestra IA</label>
    <label><input type="checkbox" name="interesse[]" value="Mobile"> Workshop Mobile</label>

    <label>Observações:</label>
    <textarea id="mensagem" name="mensagem"></textarea>

    <!-- 
        BOTÃO CORRETO
        type="submit" envia automaticamente para o Formspree
    -->
    <button type="submit" id="btnEnviar" >Inscrever-se</button>

    <div id="cadastro-message" class="message-confirm"></div>

</form>

<footer>
    DevTech 2026 • Evento tecnológico
</footer>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("cadastro-form");
    const botao = document.getElementById("btnEnviar");

    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        botao.disabled = true;
        botao.innerText = "Enviando...";

        const formData = new FormData(form);

        const dados = {
            nome: formData.get("nome"),
            email: formData.get("email"),
            telefone: formData.get("telefone"),
            nascimento: formData.get("nascimento"),
            atuacao: formData.get("atuacao"),
            interesse: formData.getAll("interesse[]").join(", "),
            fonte: formData.get("fonte"),
            data: formData.get("data"),
        };

        try {
            const { error } = await supabaseClient
                .from("Cadastro") // ⚠️ CONFIRME o nome da tabela
                .insert([dados]);

            if (error) throw error;

            alert("Cadastro realizado com sucesso!");
            form.reset();

        } catch (err) {
            console.error(err);
            alert("Erro ao salvar no banco.");
        }

        botao.disabled = false;
        botao.innerText = "Confirmar Inscrição";
    });

});
</script>

</body>
</html>
