    <p>relatorio do sistema</p>
    <table>

                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Telefone</th>
                        <th>Área de Atuação</th>
                        <th>Interesse</th>
                        <th>Data de inscrição</th>
                    </tr>
                </thead>

                <tbody id="tabelaInscritos"></tbody>

            </table>

            <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://chcshzruympfsqxqzfay.supabase.co",
  "sb_publishable_4xw9YjqGOxeyB5LxZBmGDw_wrYelGGb"
);
</script>

<script>
    // ========================================
    // RELATÓRIO
    // ========================================

    if (document.getElementById("tabelaInscritos")) {

        carregarInscritos();

    }


// ========================================
// CARREGAR INSCRITOS
// ========================================

async function carregarInscritos() {

    const { data, error } = await supabaseClient

        .from("Cadastro")

        .select("*");

    console.log(data);

    console.log(error);

    if (error) {

        console.error(error);

        alert(error.message);

        return;
    }

    const tabela =
        document.getElementById("tabelaInscritos");

    if (!tabela) return;

    tabela.innerHTML = "";

    data.forEach(inscrito => {

        tabela.innerHTML += `
            <tr>
                <td>${inscrito.nome ?? ""}</td>
                <td>${inscrito.email ?? ""}</td>
                <td>${inscrito.telefone ?? ""}</td>
                <td>${inscrito.atuacao ?? ""}</td>
                <td>${inscrito.interesse ?? ""}</td>
                <td>${inscrito.data ?? ""}</td>

            </tr>
        `;

    });

    

}
</script>

</body>
</html>
